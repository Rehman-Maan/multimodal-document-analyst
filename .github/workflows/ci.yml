name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      DATABASE_URL: sqlite:///test.sqlite3
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: ""
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_CHAT_MODEL: gpt-4.1-mini
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Django system check
        run: python manage.py check --settings=config.settings.test

      - name: Check migrations are committed
        run: python manage.py makemigrations --check --dry-run --settings=config.settings.test

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run tests
        run: python -m pytest --ds=config.settings.test

  docker:
    name: Docker build and scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          tags: multimodal-document-analyst:ci
          load: true

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: multimodal-document-analyst:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
